<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>필그림스 아카데미 지원서</title>
  <style>
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f1f5f9; color: #334155; padding: 20px; margin: 0; line-height: 1.6; }
    .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 8px solid #0f172a; }
    .header-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 25px; border-radius: 8px; margin-bottom: 30px; font-size: 14px; }
    h1 { text-align: center; color: #0f172a; margin-bottom: 5px; }
    h3 { font-size: 18px; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    label { display: block; font-size: 13px; font-weight: bold; color: #1e40af; margin-bottom: 5px; }
    .child-card { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
    .remove-btn { position: absolute; top: 15px; right: 15px; color: #ef4444; border: none; background: none; cursor: pointer; font-weight: bold; }
    .add-btn { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: bold; }
    .submit-btn { width: 100%; padding: 18px; background: #0f172a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .submit-btn:disabled { background: #94a3b8; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <div style="text-align: right; margin-bottom: 10px;">
    <a href="manage.html" style="text-decoration: none; font-size: 13px; font-weight: bold; color: #2563eb;">🔍 지원 정보 조회/수정</a>
  </div>
  <h1 id="ui-title">필그림스 아카데미 지원서</h1>
  
  <div class="header-box">
    <p id="ui-welcome-msg">정보를 불러오는 중입니다...</p>
    <div id="ui-prices" style="margin: 15px 0;"></div>
    <div id="ui-contact" style="border-top: 1px dashed #cbd5e1; padding-top: 15px; font-weight: bold;"></div>
  </div>

  <form id="academyForm">
    <div class="section">
      <h3>1. 보호자 정보</h3>
      <div class="grid">
        <div><label>보호자 성함 *</label><input type="text" id="guardianName" required></div>
        <div><label>보호자 연락처 *</label><input type="tel" id="guardianContact" placeholder="010-0000-0000" required></div>
      </div>
      <div class="grid">
        <div><label>보호자 이메일 *</label><input type="email" id="guardianEmail" placeholder="example@gmail.com" required></div>
        <div><label>주거 지역 *</label><input type="text" id="region" placeholder="예: 서울시 강남구" required></div>
      </div>
      <div class="grid">
        <div style="grid-column: span 2;"><label>상세 주소 (교재 배송용) *</label><input type="text" id="address" required></div>
      </div>
    </div>

    <div class="section">
      <h3>2. 자녀 지원 정보 <button type="button" class="add-btn" onclick="addChild()">+ 자녀 추가</button></h3>
      <div id="childrenContainer"></div>
    </div>
    <button type="submit" id="submitBtn" class="submit-btn">지원서 최종 제출하기</button>
  </form>
</div>

<script>
  // 💡 [매우 중요] 새 배포 URL을 넣어주세요!
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxestS3ovQRlMS8FGShc7ilfunaVtIyg0are77RqHJG7IFPp2DLOQ6J1B7RIvM3pCBpqw/exec";
  let childCount = 0;
  let programs = [];

  // 시트에서 폼설정 값 가져오기
  async function loadConfig() {
    try {
      const resp = await fetch(`${SCRIPT_URL}?type=config`, { redirect: "follow" });
      const config = await resp.json();
      programs = config.programs;
      
      document.getElementById('ui-welcome-msg').innerText = config.general.welcome_msg.ko;
      document.getElementById('ui-contact').innerText = `문의: ${config.general.contact_email.ko} / ${config.general.contact_phone.ko}`;
      
      let priceHtml = "<strong>[등록 가능 프로그램 안내]</strong><br>";
      programs.forEach(p => { priceHtml += `• ${p.ko}<br>`; });
      document.getElementById('ui-prices').innerHTML = priceHtml;
      
      addChild(); // 첫 자녀 폼 생성
    } catch (e) { console.error(e); alert("설정 정보를 불러오지 못했습니다."); }
  }

  function addChild() {
    if (childCount >= 5) return alert("자녀는 한 번에 최대 5명까지 등록 가능합니다.");
    childCount++;
    const id = Date.now();
    const progOptions = programs.map(p => `<option value="${p.ko}">${p.ko}</option>`).join('');
    
    const html = `
      <div class="child-card" id="child-${id}">
        ${childCount > 1 ? `<button type="button" class="remove-btn" onclick="document.getElementById('child-${id}').remove(); childCount--;">삭제 ✕</button>` : ''}
        <div class="grid">
          <div><label>자녀 성함 *</label><input type="text" class="c-name" required></div>
          <div><label>영문 이름 (여권동일) *</label><input type="text" class="c-engName" required></div>
        </div>
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
          <div><label>성별 *</label><select class="c-gender"><option value="남">남</option><option value="여">여</option></select></div>
          <div><label>생년월일 *</label><input type="date" class="c-dob" required></div>
          <div><label>학년 *</label><input type="text" class="c-grade" placeholder="예: Grade 1" required></div>
        </div>
        <div class="grid">
          <div><label>학생 구글 이메일 *</label><input type="email" class="c-studentEmail" required></div>
          <div><label>자녀 연락처 (없으면 '없음')</label><input type="text" class="c-contact" required></div>
        </div>
        <div class="grid" style="background:#f1f5f9; padding:15px; border-radius:6px; margin-top:10px;">
          <div><label>지원 프로그램 *</label><select class="c-program">${progOptions}</select></div>
          <div><label>납부 방식 *</label><select class="c-paymentMethod">
            <option value="매월 납부 (매월 1일)">매월 납부 (매월 1일)</option>
            <option value="1년 일시 납부 (할인 적용)">1년 일시 납부 (할인 적용)</option>
          </select></div>
        </div>
      </div>`;
    document.getElementById('childrenContainer').insertAdjacentHTML('beforeend', html);
  }

  window.onload = loadConfig;

  document.getElementById('academyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "제출 중입니다...";
    
    const children = Array.from(document.querySelectorAll('.child-card')).map(card => ({
      name: card.querySelector('.c-name').value,
      engName: card.querySelector('.c-engName').value,
      gender: card.querySelector('.c-gender').value,
      dob: card.querySelector('.c-dob').value,
      grade: card.querySelector('.c-grade').value,
      studentEmail: card.querySelector('.c-studentEmail').value,
      contact: card.querySelector('.c-contact').value,
      program: card.querySelector('.c-program').value,
      paymentMethod: card.querySelector('.c-paymentMethod').value
    }));

    const payload = { 
      action: 'submit',
      formType: "한국어 폼", 
      guardianName: document.getElementById('guardianName').value, 
      guardianContact: document.getElementById('guardianContact').value, 
      guardianEmail: document.getElementById('guardianEmail').value,
      region: document.getElementById('region').value, 
      address: document.getElementById('address').value, 
      children: children 
    };

    try {
      const resp = await fetch(SCRIPT_URL, { 
        redirect: "follow", 
        method: 'POST', 
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload) 
      });
      const res = await resp.json();
      if (res.result === 'duplicate') alert(`이미 [${res.studentName}] 학생의 이름으로 된 신청서가 존재합니다.`);
      else { alert("지원서가 정상적으로 접수되었습니다!"); location.reload(); }
    } catch (err) { alert("통신 오류가 발생했습니다. SCRIPT_URL을 확인해주세요."); console.error(err); }
    finally { btn.disabled = false; btn.innerText = "지원서 최종 제출하기"; }
  });
</script>
</body>
</html>
