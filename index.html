<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>필그림스 아카데미 지원서</title>
  <style>
    /* 웹사이트 디자인(CSS) */
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f4f7f6;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 15px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 25px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1a252f;
    }
    #message {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>필그림스 아카데미 지원서</h2>
    
    <form id="academyForm">
      <label for="guardianName">보호자 성함 *</label>
      <input type="text" id="guardianName" name="guardianName" required>

      <label for="guardianContact">보호자 연락처 *</label>
      <input type="tel" id="guardianContact" name="guardianContact" placeholder="010-0000-0000" required>

      <label for="childName">자녀 성함 *</label>
      <input type="text" id="childName" name="childName" required>

      <label for="program">지원 프로그램 *</label>
      <select id="program" name="program" required>
        <option value="홈스쿨 프로그램">홈스쿨 프로그램 (월 40만원 / 연 400만원)</option>
        <option value="방과후 프로그램">방과후 프로그램 (월 30만원 / 연 300만원)</option>
        <option value="랭기지 코스">랭기지 코스 (월 20만원 / 연 200만원)</option>
      </select>

      <button type="submit" id="submitBtn">지원서 제출하기</button>
      <p id="message"></p>
    </form>
  </div>

  <script>
    // 💡 매우 중요: 여기에 아까 만든 구글 앱스 스크립트 웹 앱 URL을 넣으세요!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAeISIjTtltqsFJPqR7FMXVCY16_S5JuaWg32JSzcHMh-fDRZIFFQ51lKlZx58FYtc/exec";

    document.getElementById('academyForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // 페이지 새로고침 방지
      
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');
      
      // 버튼 비활성화 및 로딩 문구 띄우기
      btn.disabled = true;
      btn.innerText = "구글 시트로 전송 중...";
      msg.innerText = "";

      // 폼 데이터 모으기
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      try {
        // 구글 스크립트로 데이터 보내기
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', // 구글 폼 연동 시 필수
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        // 성공 메시지
        msg.style.color = "green";
        msg.innerText = "지원서가 성공적으로 접수되었습니다. 감사합니다!";
        e.target.reset(); // 입력칸 빈칸으로 초기화
        
      } catch (error) {
        // 실패 메시지
        msg.style.color = "red";
        msg.innerText = "네트워크 오류가 발생했습니다. 다시 시도해주세요.";
      } finally {
        // 버튼 상태 원상복구
        btn.disabled = false;
        btn.innerText = "지원서 제출하기";
      }
    });
  </script>

</body>
</html>
