<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilgrims' Academy Application</title>
  <style>
    /* CSS 디자인 (한국어 버전과 동일하되 폰트만 영문 최적화) */
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f1f5f9; color: #334155; padding: 20px; margin: 0; line-height: 1.6; }
    .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 8px solid #0f172a; }
    .header-box { background: #f8fafc; border: 1px solid #e2e8f0; padding: 25px; border-radius: 8px; margin-bottom: 30px; font-size: 14px; }
    h1 { text-align: center; color: #0f172a; margin-bottom: 5px; }
    h3 { font-size: 18px; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    label { display: block; font-size: 13px; font-weight: bold; color: #1e40af; margin-bottom: 5px; }
    .child-card { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
    .remove-btn { position: absolute; top: 15px; right: 15px; color: #ef4444; border: none; background: none; cursor: pointer; font-weight: bold; }
    .add-btn { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: bold; }
    .submit-btn { width: 100%; padding: 18px; background: #0f172a; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <div style="text-align: right; margin-bottom: 10px;"><a href="index.html" style="text-decoration: none; color: #2563eb; font-weight: bold; font-size: 14px;">🇰🇷 한국어 버전</a></div>
  <h1>Pilgrims' Academy Application</h1>
  
  <div class="header-box">
    <h2 id="ui-welcome-h2" style="margin-top:0; font-size:18px;">Welcome</h2>
    <p id="ui-welcome-msg">Loading information...</p>
    <div id="ui-prices" style="margin: 15px 0;"></div>
    <div id="ui-contact" style="border-top: 1px dashed #cbd5e1; pt: 15px; font-weight: bold;"></div>
  </div>

  <form id="academyForm">
    <div class="section">
      <h3>1. Parent/Guardian Information</h3>
      <div class="grid">
        <div><label>Parent Full Name *</label><input type="text" id="guardianName" required></div>
        <div><label>Email Address (Contact) *</label><input type="email" id="guardianContact" placeholder="example@email.com" required></div>
      </div>
      <div class="grid">
        <div><label>City & Country *</label><input type="text" id="region" placeholder="e.g. New York, USA" required></div>
        <div><label>Full Mailing Address *</label><input type="text" id="address" placeholder="For textbook delivery" required></div>
      </div>
    </div>

    <div class="section">
      <h3>2. Child Information <button type="button" class="add-btn" onclick="addChild()">+ Add Child</button></h3>
      <div id="childrenContainer"></div>
    </div>
    <button type="submit" id="submitBtn" class="submit-btn">Submit Application</button>
  </form>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYFtCe0D6GuTxNHx4TXtxJ-Sjj0IFNDhKMzIEkykUk9fQWWolA3DcRqhaXcc3LIu_FoQ/exec";
  let childCount = 0;
  let programs = [];

  async function loadConfig() {
    try {
      const resp = await fetch(`${SCRIPT_URL}?type=config`);
      const config = await resp.json();
      programs = config.programs;
      
      document.getElementById('ui-welcome-msg').innerText = config.general.welcome_msg.en;
      document.getElementById('ui-contact').innerText = `Contact: ${config.general.contact_email.en} / ${config.general.contact_phone.en}`;
      
      let priceHtml = "<strong>[Registration Fee]</strong><br>";
      programs.forEach(p => { priceHtml += `• ${p.en}<br>`; });
      document.getElementById('ui-prices').innerHTML = priceHtml;
      
      addChild();
    } catch (e) { console.error(e); }
  }

  function addChild() {
    childCount++;
    const id = Date.now();
    const progOptions = programs.map(p => `<option value="${p.en}">${p.en}</option>`).join('');
    
    const html = `
      <div class="child-card" id="child-${id}">
        ${childCount > 1 ? `<button type="button" class="remove-btn" onclick="document.getElementById('child-${id}').remove(); childCount--;">Remove ✕</button>` : ''}
        <div class="grid">
          <div><label>Child Full Name *</label><input type="text" class="c-name" required></div>
          <div><label>English Name (Passport) *</label><input type="text" class="c-engName" required></div>
        </div>
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
          <div><label>Gender *</label><select class="c-gender"><option value="Male">Male</option><option value="Female">Female</option></select></div>
          <div><label>Date of Birth *</label><input type="date" class="c-dob" required></div>
          <div><label>Current Grade *</label><input type="text" class="c-grade" placeholder="e.g. Grade 5" required></div>
        </div>
        <div class="grid">
          <div><label>Student Gmail *</label><input type="email" class="c-studentEmail" required></div>
          <div><label>Child's Contact (If none, write 'None')</label><input type="text" class="c-contact"></div>
        </div>
        <div class="grid" style="background:#f1f5f9; padding:15px; border-radius:6px; margin-top:10px;">
          <div><label>Select Program *</label><select class="c-program">${progOptions}</select></div>
          <div><label>Payment Method *</label><select class="c-paymentMethod"><option value="Monthly">Monthly</option><option value="Yearly (Discounted)">Yearly (Discounted)</option></select></div>
        </div>
      </div>`;
    document.getElementById('childrenContainer').insertAdjacentHTML('beforeend', html);
  }

  window.onload = loadConfig;

  document.getElementById('academyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "Submitting...";
    
    const children = Array.from(document.querySelectorAll('.child-card')).map(card => ({
      name: card.querySelector('.c-name').value,
      engName: card.querySelector('.c-engName').value,
      gender: card.querySelector('.c-gender').value,
      dob: card.querySelector('.c-dob').value,
      grade: card.querySelector('.c-grade').value,
      studentEmail: card.querySelector('.c-studentEmail').value,
      contact: card.querySelector('.c-contact').value,
      program: card.querySelector('.c-program').value,
      paymentMethod: card.querySelector('.c-paymentMethod').value
    }));

    const payload = { 
      formType: "🇺🇸 English Form", 
      guardianName: document.getElementById('guardianName').value, 
      guardianContact: document.getElementById('guardianContact').value, 
      region: document.getElementById('region').value, 
      address: document.getElementById('address').value, 
      children 
    };

    try {
      const resp = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
      const res = await resp.json();
      if (res.result === 'duplicate') alert(`Already Applied: [${res.studentName}] student has been registered.`);
      else { alert("Submitted successfully!"); location.reload(); }
    } catch (err) { alert("An error occurred. Please try again."); }
    finally { btn.disabled = false; btn.innerText = "Submit Application"; }
  });
</script>
</body>
</html>
