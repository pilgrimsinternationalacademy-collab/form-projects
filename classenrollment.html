<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>세부 학습 코스 신청</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f8fafc; padding: 20px; color: #334155; line-height: 1.6; }
    .container { max-width: 600px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid #10b981; }
    h2 { text-align: center; color: #0f172a; margin-top: 0; }
    p.desc { text-align: center; font-size: 13px; color: #64748b; margin-bottom: 25px; }
    
    input[type="text"], input[type="tel"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    label.block-label { font-size: 12px; font-weight: bold; color: #047857; display: block; margin-bottom: 4px; }
    
    .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 15px; margin-bottom: 10px;}
    .btn-primary { background: #10b981; }
    .btn-secondary { background: #0f172a; }
    .btn:disabled { background: #94a3b8 !important; cursor: not-allowed; }

    #courseArea { display: none; }
    .student-badge { display: inline-block; padding: 5px 12px; background: #d1fae5; color: #065f46; font-weight: bold; border-radius: 20px; font-size: 13px; margin-bottom: 15px; }
    
    .course-card { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    .course-header { font-weight: bold; color: #1e293b; font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px; }
    
    .checkbox-item { display: flex; align-items: flex-start; margin-bottom: 10px; }
    .checkbox-item input { margin-top: 4px; margin-right: 10px; transform: scale(1.2); cursor: pointer; }
    .checkbox-item label { font-size: 13px; cursor: pointer; display: flex; flex-direction: column; }
    .file-name { color: #2563eb; font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>

<div class="container">
  <h2>클래스 및 교재 배정 신청</h2>
  <p class="desc">등록이 완료된 학생의 세부 학습 폴더 및 교재를 배정합니다.</p>
  
  <div id="loginArea">
    <label class="block-label">보호자 성함</label>
    <input type="text" id="gName" placeholder="예: 홍길동">
    
    <label class="block-label">보호자 연락처</label>
    <input type="tel" id="gContact" placeholder="예: 01012345678">
    
    <button class="btn btn-secondary" id="loginBtn" onclick="login()">등록된 자녀 정보 불러오기</button>
  </div>

  <div id="courseArea">
    <div id="studentContainer"></div>
    <button class="btn btn-primary" id="submitBtn" onclick="submitCourses()">선택 코스 최종 확정하기</button>
    <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="location.reload()">처음으로 돌아가기</button>
  </div>
</div>

<script>
  // 💡 구글에서 '새 버전'으로 배포한 URL을 넣어주세요!
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuiX6ZbdjR3UQX8pxdDq-ujEpRByack-H718xEHhWOxaxYtDOgdFOMjamPnx2AmHCYWQ/exec";
  
  let currentStudent = null;
  let loadedCourses = [];

  // [1단계] 보호자 정보로 학생 조회
  async function login() {
    const name = document.getElementById('gName').value.trim();
    const contact = document.getElementById('gContact').value.trim();
    if(!name || !contact) return alert("보호자 성함과 연락처를 입력해주세요.");

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerText = "조회 중...";

    try {
      const resp = await fetch(SCRIPT_URL, {
        redirect: "follow", // 💡 CORS 방어!
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'lookup', guardianName: name, guardianContact: contact })
      });
      const data = await resp.json();
      
      if(data.result === 'not_found') return alert("일치하는 학생 정보를 찾을 수 없습니다.");

      // '등록 완료' 상태인 자녀만 추출
      const enrolledChildren = data.children.filter(c => c.status === '🔵 등록 완료');
      if(enrolledChildren.length === 0) return alert("아직 '등록 완료' 처리된 자녀가 없습니다. 학원으로 먼저 문의해주세요.");

      // 첫 번째 자녀 기준으로 세팅 (필요시 다자녀 확장 가능)
      currentStudent = enrolledChildren[0]; 
      fetchCourseMap(currentStudent);

    } catch(e) { alert("통신 오류가 발생했습니다. 주소를 확인해주세요."); }
    finally { btn.disabled = false; btn.innerText = "등록된 자녀 정보 불러오기"; }
  }

  // [2단계] 자녀의 학년과 프로그램에 맞는 Custom Programs 데이터 가져오기
  async function fetchCourseMap(student) {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('courseArea').style.display = 'block';
    
    const container = document.getElementById('studentContainer');
    container.innerHTML = `<p style="text-align:center; color:#64748b;">맵핑된 코스를 분석 중입니다...</p>`;

    try {
      const resp = await fetch(SCRIPT_URL, {
        redirect: "follow", // 💡 CORS 방어!
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'get_map', program: student.program, grade: student.grade })
      });
      const data = await resp.json();
      
      if(data.result === 'success' && data.courses.length > 0) {
        loadedCourses = data.courses;
        renderCourses(student, loadedCourses);
      } else {
        container.innerHTML = `
          <div class="student-badge">${student.name} (${student.grade})</div>
          <p style="color:#ef4444; font-size:14px; text-align:center; background:#fee2e2; padding:15px; border-radius:8px;">
            <b>배정된 세부 코스가 없습니다.</b><br>
            지원서의 '학년'과 Custom Programs 시트의 'Grade' 형식이 일치하는지 확인해 주세요.
          </p>`;
        document.getElementById('submitBtn').style.display = 'none';
      }
    } catch(e) { alert("코스 맵핑 로드 오류"); }
  }

  // [3단계] 체크박스 렌더링 (기본 체크 상태)
  function renderCourses(student, courses) {
    let html = `<div class="student-badge">✅ ${student.name} 학생 (${student.program} / ${student.grade})</div>`;
    html += `<p style="font-size:13px; color:#475569; margin-bottom:15px;">기본 배정된 과목입니다. 수강하지 않을 과목만 체크를 해제해 주세요.</p>`;

    // Details 카테고리별로 그룹화
    const grouped = courses.reduce((acc, obj) => {
      acc[obj.details] = acc[obj.details] || [];
      acc[obj.details].push(obj);
      return acc;
    }, {});

    for (const [detailName, items] of Object.entries(grouped)) {
      html += `<div class="course-card"><div class="course-header">📘 ${detailName}</div>`;
      items.forEach((item, idx) => {
        const itemData = encodeURIComponent(JSON.stringify(item));
        html += `
          <div class="checkbox-item">
            <input type="checkbox" id="chk_${detailName}_${idx}" value="${itemData}" checked>
            <label for="chk_${detailName}_${idx}">
              <span style="font-weight:bold;">${item.folder}</span>
              <span class="file-name">교재: ${item.file}</span>
            </label>
          </div>
        `;
      });
      html += `</div>`;
    }
    document.getElementById('studentContainer').innerHTML = html;
  }

  // [4단계] 선택 완료 후 Classroom Roster로 제출
  async function submitCourses() {
    const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
    if(checkboxes.length === 0) return alert("최소 1개 이상의 코스를 선택해야 합니다.");

    if(!confirm(`총 ${checkboxes.length}개의 세부 코스를 확정하시겠습니까?`)) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.innerText = "서버 전송 중...";

    const selectedCourses = Array.from(checkboxes).map(chk => JSON.parse(decodeURIComponent(chk.value)));

    try {
      const resp = await fetch(SCRIPT_URL, {
        redirect: "follow", // 💡 CORS 방어!
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'submit_courses', 
          childName: currentStudent.name,
          program: currentStudent.program,
          grade: currentStudent.grade,
          selectedCourses: selectedCourses
        })
      });
      const data = await resp.json();
      
      if(data.result === 'success') {
        alert("세부 코스 배정이 완료되었습니다!\nClassroom Roster 시트에 정상 등록되었습니다.");
        location.reload();
      } else alert("오류: " + data.message);
    } catch(e) { alert("제출 중 오류가 발생했습니다."); }
    finally { btn.disabled = false; btn.innerText = "선택 코스 최종 확정하기"; }
  }
</script>
</body>
</html>
