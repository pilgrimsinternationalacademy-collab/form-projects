<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>필그림스 지원 정보 관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; padding: 20px; color: #334155; }
    .card { max-width: 450px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid #2563eb; }
    h2 { text-align: center; color: #0f172a; margin-top: 0; }
    input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    label { font-size: 13px; font-weight: bold; color: #1e40af; display: block; margin-bottom: 5px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 15px; }
    .btn:disabled { background: #94a3b8 !important; cursor: not-allowed; }
    .btn-search { background: #0f172a; }
    .btn-update { background: #2563eb; }
    .btn-cancel { background: #ef4444; }
    #infoArea { display: none; margin-top: 20px; border-top: 1px dashed #cbd5e1; padding-top: 20px; }
    .status-badge { display: block; padding: 10px; background: #f1f5f9; border-radius: 6px; text-align: center; margin-bottom: 20px; font-weight: bold; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>

<div class="card">
  <h2>지원 내역 조회</h2>
  
  <div id="searchArea">
    <label>자녀 이름</label>
    <input type="text" id="lookName" placeholder="홍길동">
    
    <label>학생 구글 이메일</label>
    <input type="email" id="lookEmail" placeholder="example@gmail.com">
    
    <button class="btn btn-search" id="searchBtn" onclick="lookup()">조회하기</button>
  </div>

  <div id="infoArea">
    <div id="status" class="status-badge"></div>
    
    <label>프로그램 (등록 완료 시 변경 불가)</label>
    <select id="editProg"></select>
    
    <label>자녀 연락처 (수정 가능)</label>
    <input type="text" id="editContact">
    
    <div id="actionBtns">
      <button class="btn btn-update" id="saveBtn" onclick="update()">수정 내용 저장</button>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancel()">지원 취소하기</button>
    </div>
    
    <button class="btn" style="background: #e2e8f0; color: #475569;" onclick="location.reload()">처음으로</button>
  </div>
</div>

<script>
  // 💡 [필독] '새 배포' 후 복사한 URL을 여기에 따옴표 사이에 붙여넣으세요!
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuiX6ZbdjR3UQX8pxdDq-ujEpRByack-H718xEHhWOxaxYtDOgdFOMjamPnx2AmHCYWQ/exec";
  
  let sName = "", sEmail = "";

  // [기능 1] 정보 조회
  async function lookup() {
    sName = document.getElementById('lookName').value.trim();
    sEmail = document.getElementById('lookEmail').value.trim();
    
    if(!sName || !sEmail) {
      alert("이름과 이메일을 모두 입력해주세요.");
      return;
    }

    if(SCRIPT_URL.includes("여기에")) {
      alert("SCRIPT_URL 주소가 비어있습니다. 구글 앱스 스크립트 주소를 넣어주세요.");
      return;
    }

    const btn = document.getElementById('searchBtn');
    btn.innerText = "조회 중...";
    btn.disabled = true;

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'lookup', childName: sName, studentEmail: sEmail })
      });
      
      const data = await resp.json();
      
      if(data.result === 'not_found') {
        alert("일치하는 지원 정보를 찾을 수 없습니다.\n이름과 이메일의 띄어쓰기를 확인해 주세요.");
        return;
      }

      // 화면 전환 및 데이터 표시
      document.getElementById('searchArea').style.display = 'none';
      document.getElementById('infoArea').style.display = 'block';
      
      const statusDiv = document.getElementById('status');
      statusDiv.innerText = `현재 상태: ${data.status}`;
      document.getElementById('editContact').value = data.student.contact;

      // 프로그램 목록 세팅
      const sel = document.getElementById('editProg');
      if (data.programs) {
        sel.innerHTML = data.programs.map(p => `<option value="${p}">${p}</option>`).join('');
        sel.value = data.student.program;
      }

      // 🚨 규칙 적용: 등록 완료 시 프로그램 수정만 차단
      if(data.status === '🔵 등록 완료') {
        document.getElementById('editProg').disabled = true; // 프로그램 고정
        document.getElementById('cancelBtn').style.display = 'none'; // 취소 불가
        statusDiv.style.background = '#dbeafe';
        statusDiv.innerText += "\n(연락처만 수정 가능합니다)";
      }
      
    } catch(e) {
      console.error(e);
      alert("조회 실패! 원인: " + e.message + "\n배포 URL과 인터넷 연결을 확인하세요.");
    } finally {
      btn.innerText = "조회하기";
      btn.disabled = false;
    }
  }

  // [기능 2] 정보 수정
  async function update() {
    if(!confirm("정보를 수정하시겠습니까?")) return;
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'update', 
          childName: sName, 
          studentEmail: sEmail,
          updateData: { 
            contact: document.getElementById('editContact').value, 
            program: document.getElementById('editProg').value,
            payment: '수정됨'
          }
        })
      });
      const res = await resp.json();
      if(res.result === 'success') alert("수정 완료!");
      else alert("실패: " + res.message);
    } catch(e) { alert("통신 오류"); }
    finally { btn.disabled = false; }
  }

  // [기능 3] 지원 취소
  async function cancel() {
    if(!confirm("정말 지원을 취소하시겠습니까?")) return;
    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'cancel', childName: sName, studentEmail: sEmail })
      });
      const res = await resp.json();
      if(res.result === 'success') {
        alert("취소 완료!");
        location.reload();
      } else alert("실패: " + res.message);
    } catch(e) { alert("통신 오류"); }
  }
</script>
</body>
</html>
