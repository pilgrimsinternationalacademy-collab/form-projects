<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>필그림스 지원 정보 조회 및 수정</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; padding: 20px; color: #334155; line-height: 1.6; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; border-top: 8px solid #0f172a; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h2 { text-align: center; color: #0f172a; margin-bottom: 25px; }
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #475569; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn-primary { background: #0f172a; color: #fff; }
    .btn-update { background: #2563eb; color: #fff; }
    .btn-cancel { background: #ef4444; color: #fff; }
    .status-banner { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
    #editArea { display: none; margin-top: 20px; border-top: 1px dashed #cbd5e1; padding-top: 20px; }
    .child-selector { background: #f8fafc; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>

<div class="container">
  <h2>지원 정보 관리</h2>
  
  <div id="loginArea">
    <div class="input-group">
      <label>보호자 성함</label>
      <input type="text" id="guardianName" placeholder="성함을 입력하세요">
    </div>
    <div class="input-group">
      <label>보호자 연락처</label>
      <input type="tel" id="guardianContact" placeholder="010-0000-0000">
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="lookup()">내역 조회하기</button>
  </div>

  <div id="editArea">
    <div id="statusBanner" class="status-banner"></div>
    
    <div class="child-selector" id="multiChildArea" style="display:none;">
      <label>수정할 자녀 선택</label>
      <select id="childSelect" onchange="displayChildInfo(this.value)"></select>
    </div>

    <div class="input-group">
      <label>자녀 이름 (수정 가능)</label>
      <input type="text" id="editChildName">
    </div>
    <div class="input-group">
      <label>지원 프로그램 (등록 완료 시 고정)</label>
      <select id="editProgram"></select>
    </div>
    <div class="input-group">
      <label>자녀 연락처 (수정 가능)</label>
      <input type="text" id="editStudentContact">
    </div>
    <div class="input-group">
      <label>보호자 연락처 (수정 가능)</label>
      <input type="text" id="editGuardianContact">
    </div>
    <div class="input-group">
      <label>자택 주소 (수정 가능)</label>
      <input type="text" id="editAddress">
    </div>

    <div id="actionBtns">
      <button class="btn btn-update" onclick="update()">변경 사항 저장</button>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancel()">지원 취소하기</button>
    </div>
    <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="location.reload()">로그아웃</button>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuiX6ZbdjR3UQX8pxdDq-ujEpRByack-H718xEHhWOxaxYtDOgdFOMjamPnx2AmHCYWQ/exec";
  let searchResults = [];
  let currentRowIdx = -1;

  async function lookup() {
    const name = document.getElementById('guardianName').value;
    const contact = document.getElementById('guardianContact').value;
    if(!name || !contact) return alert("보호자 정보를 입력해주세요.");

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.innerText = "조회 중...";

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'lookup', guardianName: name, guardianContact: contact })
      });
      const res = await resp.json();

      if(res.result === 'not_found') {
        alert("일치하는 지원 내역이 없습니다.");
      } else {
        searchResults = res.data;
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('editArea').style.display = 'block';
        
        // 프로그램 목록 세팅
        const progSel = document.getElementById('editProgram');
        progSel.innerHTML = res.programs.map(p => `<option value="${p}">${p}</option>`).join('');

        // 자녀가 여러 명일 경우 선택창 표시
        if(searchResults.length > 1) {
          const cSel = document.getElementById('childSelect');
          cSel.innerHTML = searchResults.map((c, i) => `<option value="${i}">${c.childName} 학생</option>`).join('');
          document.getElementById('multiChildArea').style.display = 'block';
        }
        
        displayChildInfo(0);
      }
    } catch(e) { alert("서버 통신 오류가 발생했습니다."); }
    finally { btn.disabled = false; btn.innerText = "내역 조회하기"; }
  }

  function displayChildInfo(index) {
    const child = searchResults[index];
    currentRowIdx = child.rowIdx;
    
    document.getElementById('editChildName').value = child.childName;
    document.getElementById('editProgram').value = child.program;
    document.getElementById('editStudentContact').value = child.studentContact;
    document.getElementById('editGuardianContact').value = child.guardianContact;
    document.getElementById('editAddress').value = child.address;

    const banner = document.getElementById('statusBanner');
    banner.innerText = `현재 상태: ${child.status}`;

    // 🚨 등록 완료 규칙 적용
    if(child.status === '🔵 등록 완료') {
      document.getElementById('editProgram').disabled = true;
      document.getElementById('cancelBtn').style.display = 'none';
      banner.style.background = '#dbeafe';
      banner.style.color = '#1e40af';
      banner.innerText += " (프로그램은 수정이 불가능합니다)";
    } else {
      document.getElementById('editProgram').disabled = false;
      document.getElementById('cancelBtn').style.display = 'block';
      banner.style.background = '#fef9c3';
      banner.style.color = '#854d0e';
    }
  }

  async function update() {
    if(!confirm("정보를 수정하시겠습니까?")) return;
    
    const updateData = {
      childName: document.getElementById('editChildName').value,
      program: document.getElementById('editProgram').value,
      studentContact: document.getElementById('editStudentContact').value,
      guardianName: document.getElementById('guardianName').value,
      guardianContact: document.getElementById('editGuardianContact').value,
      region: searchResults[0].region, // 기존 데이터 유지
      address: document.getElementById('editAddress').value,
      studentEmail: searchResults[0].studentEmail, // 고정
      payment: searchResults[0].payment // 고정
    };

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'update', rowIdx: currentRowIdx, updateData: updateData })
      });
      const res = await resp.json();
      if(res.result === 'success') alert("성공적으로 수정되었습니다.");
      else alert(res.message);
    } catch(e) { alert("수정 중 오류가 발생했습니다."); }
  }

  async function cancel() {
    if(!confirm("정말 지원을 취소하시겠습니까?")) return;
    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'cancel', rowIdx: currentRowIdx })
      });
      const res = await resp.json();
      if(res.result === 'success') {
        alert("지원이 취소되었습니다.");
        location.reload();
      } else alert(res.message);
    } catch(e) { alert("취소 중 오류가 발생했습니다."); }
  }
</script>
</body>
</html>
