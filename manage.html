<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>필그림스 지원 관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; background: #f8fafc; padding: 20px; color: #334; }
    .container { max-width: 450px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 6px solid #2563eb; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cbd; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
    .btn-search { background: #0f172a; color: #fff; }
    .btn-update { background: #2563eb; color: #fff; }
    .btn-cancel { background: #ef4444; color: #fff; }
    #editArea { display: none; border-top: 1px dashed #ccc; margin-top: 20px; padding-top: 20px; }
    .status-box { padding: 10px; background: #f1f5f9; border-radius: 5px; text-align: center; margin-bottom: 15px; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <h2 style="text-align: center;">지원 정보 조회</h2>
  <div id="searchArea">
    <input type="text" id="lookName" placeholder="자녀 이름">
    <input type="email" id="lookEmail" placeholder="학생 구글 이메일">
    <button class="btn btn-search" onclick="lookup()">조회하기</button>
  </div>

  <div id="editArea">
    <div id="statusBox" class="status-box"></div>
    <label style="font-size: 12px;">지원 프로그램</label>
    <select id="editProg"></select>
    <label style="font-size: 12px;">자녀 연락처</label>
    <input type="text" id="editContact">
    
    <div id="actionBtns">
      <button class="btn btn-update" onclick="update()">정보 수정 저장</button>
      <button class="btn btn-cancel" onclick="cancel()">지원 취소하기</button>
    </div>
    <button class="btn" style="background:#e2e; color:#334;" onclick="location.reload()">처음으로</button>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYFtCe0D6GuTxNHx4TXtxJ-Sjj0IFNDhKMzIEkykUk9fQWWolA3DcRqhaXcc3LIu_FoQ/exec";
  let savedName = "", savedEmail = "";

  async function lookup() {
    savedName = document.getElementById('lookName').value;
    savedEmail = document.getElementById('lookEmail').value;
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'lookup', childName: savedName, studentEmail: savedEmail })
    });
    const data = await res.json();
    if(data.result === 'not_found') return alert("정보를 찾을 수 없습니다.");
    
    document.getElementById('searchArea').style.display = 'none';
    document.getElementById('editArea').style.display = 'block';
    document.getElementById('statusBox').innerText = `상태: ${data.status}`;
    document.getElementById('editContact').value = data.student.contact;
    
    // 프로그램 리스트 세팅
    const confRes = await fetch(`${SCRIPT_URL}?type=config`);
    const conf = await confRes.json();
    const select = document.getElementById('editProg');
    select.innerHTML = conf.programs.map(p => `<option value="${p.ko}">${p.ko}</option>`).join('');
    select.value = data.student.program;

    // 규칙 적용: 등록 완료면 버튼 숨기기
    if(data.status === '🔵 등록 완료') {
      document.getElementById('actionBtns').style.display = 'none';
      document.getElementById('statusBox').style.color = 'blue';
      document.getElementById('statusBox').innerText += " (수정/취소 불가)";
    }
  }

  async function update() {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'update', childName: savedName, studentEmail: savedEmail, updateData: { contact: document.getElementById('editContact').value, program: document.getElementById('editProg').value, payment: '매월 납부' } })
    });
    const data = await res.json();
    alert(data.result === 'success' ? "수정 완료!" : data.message);
  }

  async function cancel() {
    if(!confirm("정말 취소하시겠습니까?")) return;
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'cancel', childName: savedName, studentEmail: savedEmail })
    });
    const data = await res.json();
    alert(data.result === 'success' ? "취소 완료!" : data.message);
    location.reload();
  }
</script>
</body>
</html>
