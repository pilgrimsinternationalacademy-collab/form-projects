<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>필그림스 학부모 대시보드</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; padding: 20px; color: #334155; }
    .card { max-width: 550px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid #2563eb; }
    h2 { text-align: center; color: #0f172a; margin-top: 0; }
    .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px; }
    
    input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    label { font-size: 13px; font-weight: bold; color: #1e40af; display: block; margin-bottom: 5px; }
    
    .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; font-size: 14px; }
    .btn:disabled { background: #94a3b8 !important; cursor: not-allowed; }
    .btn-search { background: #0f172a; }
    .btn-update { background: #2563eb; }
    .btn-cancel { background: #ef4444; }

    /* 자녀별 카드 스타일 */
    .child-box { border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 25px; background: #fafafa; }
    .child-header { font-size: 18px; font-weight: bold; color: #0f172a; margin-bottom: 10px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    .status-badge { display: inline-block; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .status-done { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; }
    .status-cancel { background: #f1f5f9; color: #64748b; border-color: #cbd5e1; }
    
    #infoArea { display: none; margin-top: 20px; }
    .guardian-info { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <h2>보호자 지원 내역 조회</h2>
  <p class="subtitle" id="subText">지원서 작성 시 입력한 보호자 정보를 입력해주세요.</p>
  
  <div id="searchArea">
    <label>보호자 성함</label>
    <input type="text" id="gName" placeholder="보호자 이름 입력">
    
    <label>보호자 연락처</label>
    <input type="tel" id="gContact" placeholder="010-0000-0000">
    
    <button class="btn btn-search" id="searchBtn" onclick="lookup()">내역 조회하기</button>
  </div>

  <div id="infoArea">
    <div class="guardian-info" id="guardInfoBox"></div>
    
    <h3 style="color: #0f172a; margin-top: 30px;">자녀 지원 관리</h3>
    <div id="childrenList"></div>
    
    <button class="btn" style="background: #64748b; margin-top: 20px;" onclick="location.reload()">로그아웃 (처음으로)</button>
  </div>
</div>

<script>
  // 💡 [매우 중요] '새 배포' 후 복사한 URL을 여기에 반드시 붙여넣으세요!
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuiX6ZbdjR3UQX8pxdDq-ujEpRByack-H718xEHhWOxaxYtDOgdFOMjamPnx2AmHCYWQ/exec";
  
  let currentGuardianName = "";
  let currentGuardianContact = "";
  let globalPrograms = [];

  // [기능 1] 보호자 정보로 통합 조회
  async function lookup() {
    currentGuardianName = document.getElementById('gName').value.trim();
    currentGuardianContact = document.getElementById('gContact').value.trim();
    
    if(!currentGuardianName || !currentGuardianContact) return alert("보호자 이름과 연락처를 모두 입력해주세요.");

    const btn = document.getElementById('searchBtn');
    btn.innerText = "조회 중입니다..."; btn.disabled = true;

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'lookup', guardianName: currentGuardianName, guardianContact: currentGuardianContact })
      });
      
      const data = await resp.json();
      
      if(data.result === 'not_found') {
        alert("일치하는 지원 내역이 없습니다.\n입력하신 보호자 이름과 연락처를 다시 확인해 주세요.");
        return;
      }

      globalPrograms = data.programs || [];
      
      // 화면 전환
      document.getElementById('searchArea').style.display = 'none';
      document.getElementById('subText').style.display = 'none';
      document.getElementById('infoArea').style.display = 'block';
      
      // 보호자 기본 정보 표시
      document.getElementById('guardInfoBox').innerHTML = `
        <strong>[보호자 정보]</strong><br>
        이름: ${data.guardian.name} <br>
        연락처: ${data.guardian.contact} <br>
        주소: ${data.guardian.address}
      `;

      // 자녀 목록 렌더링
      renderChildren(data.children);
      
    } catch(e) {
      alert("조회 실패! 서버 연결에 문제가 있습니다.");
    } finally {
      btn.innerText = "내역 조회하기"; btn.disabled = false;
    }
  }

  // 화면에 자녀 박스 그리기
  function renderChildren(children) {
    const listDiv = document.getElementById('childrenList');
    listDiv.innerHTML = '';

    children.forEach((child, index) => {
      const isDone = child.status === '🔵 등록 완료';
      const isCanceled = child.status === '⚫ 취소/보류';
      
      // 상태 뱃지 스타일링
      let badgeClass = 'status-badge';
      let badgeText = `진행 상태: ${child.status}`;
      if(isDone) { badgeClass += ' status-done'; badgeText += ' (프로그램/취소 변경 불가)'; }
      if(isCanceled) { badgeClass += ' status-cancel'; badgeText = '지원 취소됨'; }

      // 프로그램 옵션 만들기
      const progOptions = globalPrograms.map(p => 
        `<option value="${p}" ${child.program === p ? 'selected' : ''}>${p}</option>`
      ).join('');

      const childHtml = `
        <div class="child-box">
          <div class="child-header">${child.name} <span style="font-size:13px; color:#64748b;">(${child.engName}) / ${child.grade}</span></div>
          <div class="${badgeClass}">${badgeText}</div>
          
          <label>자녀 연락처</label>
          <input type="text" id="contact-${index}" value="${child.contact}" ${isCanceled ? 'disabled' : ''}>
          
          <label>지원 프로그램</label>
          <select id="program-${index}" ${(isDone || isCanceled) ? 'disabled' : ''}>
            ${progOptions}
          </select>
          
          <label>납부 방식</label>
          <select id="payment-${index}" ${isCanceled ? 'disabled' : ''}>
            <option value="매월 납부 (매월 1일)" ${child.payment.includes('매월') ? 'selected' : ''}>매월 납부</option>
            <option value="1년 일시 납부 (할인 적용)" ${child.payment.includes('일시') ? 'selected' : ''}>1년 일시 납부</option>
          </select>

          ${!isCanceled ? `
            <div style="margin-top: 15px; display:flex; gap:10px;">
              <button class="btn btn-update" style="margin:0;" onclick="updateChild('${child.name}', ${index})">저장</button>
              ${!isDone ? `<button class="btn btn-cancel" style="margin:0;" onclick="cancelChild('${child.name}')">취소</button>` : ''}
            </div>
          ` : ''}
        </div>
      `;
      listDiv.insertAdjacentHTML('beforeend', childHtml);
    });
  }

  // [기능 2] 자녀 개별 정보 수정
  async function updateChild(childName, index) {
    if(!confirm(`[${childName}] 학생의 정보를 수정하시겠습니까?`)) return;
    
    const uContact = document.getElementById(`contact-${index}`).value;
    const uProgram = document.getElementById(`program-${index}`).value;
    const uPayment = document.getElementById(`payment-${index}`).value;

    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'update', 
          guardianName: currentGuardianName, 
          guardianContact: currentGuardianContact,
          childName: childName,
          updateData: { contact: uContact, program: uProgram, payment: uPayment }
        })
      });
      const res = await resp.json();
      if(res.result === 'success') alert(`[${childName}] 학생의 정보가 정상적으로 수정되었습니다.`);
      else alert("수정 실패: " + res.message);
    } catch(e) { alert("통신 오류"); }
  }

  // [기능 3] 자녀 개별 지원 취소
  async function cancelChild(childName) {
    if(!confirm(`정말 [${childName}] 학생의 지원을 취소하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
    
    try {
      const resp = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'cancel', 
          guardianName: currentGuardianName, 
          guardianContact: currentGuardianContact,
          childName: childName
        })
      });
      const res = await resp.json();
      if(res.result === 'success') {
        alert(`[${childName}] 학생의 지원이 취소되었습니다.`);
        // 취소 성공 시 해당 보호자 정보로 화면 재조회(새로고침 효과)
        lookup();
      }
      else alert("취소 실패: " + res.message);
    } catch(e) { alert("통신 오류"); }
  }
</script>
</body>
</html>
