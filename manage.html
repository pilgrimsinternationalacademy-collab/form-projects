<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>필그림스 통합 지원 관리</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background: #f1f5f9; padding: 20px; color: #334155; line-height: 1.6; }
    .container { max-width: 600px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 6px solid #2563eb; }
    h2 { text-align: center; color: #0f172a; margin-top: 0; }
    h3 { font-size: 16px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; color: #1e293b; margin-top: 25px; }
    input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
    input:disabled, select:disabled { background: #f1f5f9; cursor: not-allowed; color: #64748b; opacity: 0.8; }
    label { font-size: 12px; font-weight: bold; color: #1e40af; display: block; margin-bottom: 4px; }
    
    .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 15px; margin-bottom: 10px;}
    .btn-search { background: #0f172a; }
    .btn-update { background: #2563eb; margin-top: 20px; }
    .btn-cancel { background: #ef4444; width: auto; padding: 8px 15px; font-size: 12px; float: right; margin-top: -35px; position: relative; z-index: 10;}
    
    #infoArea { display: none; }
    .child-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 15px; position: relative; }
    .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 15px; background: #e2e8f0; }
    .done-status { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .readonly-text { font-size: 14px; font-weight: bold; margin-bottom: 15px; color: #334155; }
  </style>
</head>
<body>

<div class="container">
  <div style="text-align: right; margin-bottom: 10px;">
    <a href="index.html" style="text-decoration: none; font-size: 13px; font-weight: bold; color: #10b981;">신규 지원서 작성</a>
  </div>
  <h2>지원 정보 통합 관리</h2>
  
  <div id="searchArea">
    <p style="text-align:center; font-size:13px; color:#64748b; margin-bottom:20px;">지원서 제출 시 입력한 보호자 정보를 입력해 주세요.</p>
    <label>보호자 성함</label>
    <input type="text" id="lookGName" placeholder="예: 홍길동">
    
    <label>보호자 연락처</label>
    <input type="tel" id="lookGContact" placeholder="예: 01012345678">
    
    <button class="btn btn-search" id="searchBtn" onclick="lookup()">내역 조회하기</button>
  </div>

  <div id="infoArea">
    <h3>보호자 정보 (수정 가능)</h3>
    <div class="grid-2">
      <div><label>보호자 성함</label><input type="text" id="gName"></div>
      <div><label>보호자 연락처</label><input type="text" id="gContact"></div>
    </div>
    <div class="grid-2">
      <div><label>보호자 이메일</label><input type="email" id="gEmail"></div>
      <div><label>거주 지역</label><input type="text" id="gRegion"></div>
    </div>
    <div><label>상세 주소</label><input type="text" id="gAddress"></div>

    <h3>자녀 지원 정보</h3>
    <div id="childrenList"></div>

    <button class="btn btn-update" id="saveBtn" onclick="updateAll()">전체 수정 내용 저장하기</button>
    <button class="btn" style="background: #64748b;" onclick="location.reload()">처음으로 돌아가기</button>
  </div>
</div>

<script>
  // 💡 새 배포 URL을 여기에 정확히 넣어주세요!
  const SCRIPT_URL = "여기에_원장님의_배포_URL을_넣으세요";
  
  let globalChildren = [];
  let availablePrograms = [];

  // [1. 내역 조회 기능]
  async function lookup() {
    const reqName = document.getElementById('lookGName').value;
    const reqContact = document.getElementById('lookGContact').value;
    
    if(!reqName || !reqContact) return alert("보호자 성함과 연락처를 모두 입력해주세요.");

    const btn = document.getElementById('searchBtn');
    btn.innerText = "조회 중입니다..."; btn.disabled = true;

    try {
      const resp = await fetch(SCRIPT_URL, {
        redirect: "follow", 
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'lookup', guardianName: reqName, guardianContact: reqContact })
      });
      
      const data = await resp.json();
      
      if(data.result === 'not_found') {
        alert("일치하는 정보를 찾을 수 없습니다.\n입력하신 성함과 번호를 다시 확인해주세요.");
        return;
      }

      availablePrograms = data.programs;
      globalChildren = data.children;

      document.getElementById('searchArea').style.display = 'none';
      document.getElementById('infoArea').style.display = 'block';
      
      document.getElementById('gName').value = data.guardian.name;
      document.getElementById('gContact').value = data.guardian.contact;
      document.getElementById('gRegion').value = data.guardian.region;
      document.getElementById('gAddress').value = data.guardian.address;
      document.getElementById('gEmail').value = data.guardian.email || '';

      renderChildren();
      
    } catch(e) { 
      alert("통신 오류가 발생했습니다. SCRIPT_URL 또는 배포 권한을 확인해 주세요."); 
    } finally { 
      btn.innerText = "내역 조회하기"; btn.disabled = false; 
    }
  }

  // [2. 자녀 리스트 카드 생성]
  function renderChildren() {
    const container = document.getElementById('childrenList');
    container.innerHTML = '';

    globalChildren.forEach((c, index) => {
      const isDone = (c.status === '🔵 등록 완료');
      const isCanceled = (c.status === '⚫ 취소/보류');
      const progOpts = availablePrograms.map(p => `<option value="${p}" ${p===c.program?'selected':''}>${p}</option>`).join('');
      
      let badgeClass = isDone ? 'status-badge done-status' : 'status-badge';
      let badgeText = isDone ? '등록 완료 (프로그램 및 납부 방식 변경 불가)' : `상태: ${c.status}`;

      const card = `
        <div class="child-card" id="childCard_${index}">
          ${(!isDone && !isCanceled) ? `<button class="btn-cancel" onclick="cancelChild(${c.rowIdx}, '${c.name}')">지원 취소</button>` : ''}
          <div class="${badgeClass}">${badgeText}</div>
          
          <div class="readonly-text">${c.name} (${c.engName}) / ${c.gender} / ${c.grade}</div>
          
          <div class="grid-2">
            <div><label>학생 이메일 (수정가능)</label><input type="email" id="cEmail_${index}" value="${c.email}" ${isCanceled?'disabled':''}></div>
            <div><label>학생 연락처 (수정가능)</label><input type="text" id="cContact_${index}" value="${c.contact}" ${isCanceled?'disabled':''}></div>
          </div>
          
          <div class="grid-2">
            <div><label>지원 프로그램</label>
              <select id="cProg_${index}" ${isDone || isCanceled ? 'disabled' : ''}>${progOpts}</select>
            </div>
            <div><label>납부 방식</label>
              <select id="cPay_${index}" ${isDone || isCanceled ? 'disabled' : ''}>
                <option value="매월 납부 (매월 1일)" ${c.payment.includes('매월')?'selected':''}>매월 납부</option>
                <option value="1년 일시 납부 (할인 적용)" ${c.payment.includes('1년')?'selected':''}>1년 일시 납부</option>
              </select>
            </div>
          </div>
        </div>
      `;
      container.innerHTML += card;
    });
  }

  // [3. 전체 내용 수정 저장 기능]
  async function updateAll() {
    if(!confirm("현재 입력된 내용으로 모든 정보를 업데이트 하시겠습니까?")) return;
    
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerText = "저장 중...";

    const updatedChildren = globalChildren.map((c, index) => {
      return {
        rowIdx: c.rowIdx,
        originalName: c.name,
        email: document.getElementById(`cEmail_${index}`).value,
        contact: document.getElementById(`cContact_${index}`).value,
        program: document.getElementById(`cProg_${index}`).value,
        payment: document.getElementById(`cPay_${index}`).value
      };
    });

    const payload = {
      action: 'update',
      updateData: {
        guardian: {
          name: document.getElementById('gName').value,
          contact: document.getElementById('gContact').value,
          region: document.getElementById('gRegion').value,
          address: document.getElementById('gAddress').value,
          email: document.getElementById('gEmail').value 
        },
        children: updatedChildren
      }
    };

    try {
      const resp = await fetch(SCRIPT_URL, {
        redirect: "follow", 
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      const res = await resp.json();
      if(res.result === 'success') {
        alert("성공적으로 수정되었습니다!");
        location.reload();
      } else alert("수정 실패: " + res.message);
    } catch(e) { 
      alert("통신 오류가 발생했습니다. 저장 권한을 확인해 주세요."); 
    } finally { 
      btn.disabled = false; btn.innerText = "전체 수정 내용 저장하기"; 
    }
  }

  // [4. 지원 취소 기능]
  async function cancelChild(rowIdx, childName) {
    if(!confirm(`[${childName}] 학생의 지원을 취소하시겠습니까?\n취소 시 복구할 수 없습니다.`)) return;
    try {
      const resp = await fetch(SCRIPT_URL, {
        redirect: "follow", 
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'cancel', rowIdx: rowIdx, childName: childName })
      });
      const res = await resp.json();
      if(res.result === 'success') {
        alert("지원이 취소되었습니다.");
        location.reload();
      } else alert("실패: " + res.message);
    } catch(e) { alert("통신 오류"); }
  }
</script>
</body>
</html>
